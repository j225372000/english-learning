name: Daily YouTube Channel Monitor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  monitor-channel:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    - name: ⚙️ Run Daily Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python process_video.py

    - name: 💾 Automatically Commit and Push the Markdown File
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        # 檢查有沒有新產生的 Markdown 檔案，有才提交，防止排程因無變更而報錯
        git diff --quiet && git diff --staged --quiet || (git commit -m "✨ 自動更新：新增 Gemini AI 學習筆記" && git push)
