name: Universal AI Agent Workflow

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      video_id:
        description: '請輸入 YouTube 影片 11 碼 ID'
        required: true
        default: 'dQw4w9WgXcQ'
      video_type:
        description: '請選擇 Prompt 大腦範本 (english / fed / general)'
        required: true
        default: 'general'
      video_output:
        description: '請選擇輸出技能形式 (markdown / line)'
        required: true
        default: 'markdown'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    - name: ⚙️ Run Universal Agent Core
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        VIDEO_ID: ${{ github.event.inputs.video_id }}
        VIDEO_TYPE: ${{ github.event.inputs.video_type }}
        VIDEO_OUTPUT: ${{ github.event.inputs.video_output }}
        # 如果未來要用 LINE，可以在 Secrets 補上 LINE_CHANNEL_ACCESS_TOKEN
        LINE_TOKEN: ${{ secrets.LINE_TOKEN }} 
      run: |
        if [ -z "$VIDEO_ID" ]; then
          export VIDEO_ID="dQw4w9WgXcQ"
          export VIDEO_TYPE="general"
          export VIDEO_OUTPUT="markdown"
        fi
        python agent_core.py

    - name: 💾 Automatically Commit and Push (Only for Markdown output)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git fetch origin
        git add *.md || true
        git add 🚨*.md || true
        if ! git diff --cached --quiet; then
          git commit -m "✨ AI自動更新：新增學習筆記 [skip ci]"
          git push origin HEAD:${{ github.ref }}
          echo "🚀 [成功] Markdown 檔案已強力同步推回 Code 首頁！"
        else
          echo "📭 沒有偵測到新 Markdown 檔案，跳過 Commit。"
        fi
