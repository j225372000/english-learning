name: Universal AI Agent Workflow

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      input_data:
        description: '請輸入素材資料 (YouTube ID / 網頁網址 / 檔案路徑)'
        required: true
        default: 'dQw4w9WgXcQ'
      input_type:
        description: '請選擇輸入技能類型 (youtube=舊版 / yt=新逐字稿版 / web / pdf)'
        required: true
        default: 'yt'
      video_type:
        description: '請選擇 Prompt 大腦範本 (english / fed / general)'
        required: true
        default: 'general'
      video_output:
        description: '請選擇輸出技能形式 (markdown / line)'
        required: true
        default: 'markdown'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        token: ${{ secrets.GITHUB_TOKEN }} # 🛡️ 加上這行，1秒破解 GitHub 官方對 Actions 虛擬機的 429 限流

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 🌟 【環境解鎖】安裝 Linux 系統級音訊轉碼器，這是 Whisper/yt-dlp 轉檔 mp3 的核心必需品
        sudo apt-get update && sudo apt-get install -y ffmpeg
        
        # 🌟 【核心升級】安裝並強制升級最新版 yt-dlp，確保跳過 YouTube 的下載阻斷機制
        pip install --upgrade yt-dlp
        
        # 安裝原本與新積木（YouTube 字幕與 PDF 解析）所需的 Python 核心依賴庫
        pip install google-genai pypdf youtube-transcript-api

    - name: ⚙️ Run Universal Agent Core
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        INPUT_DATA: ${{ github.event.inputs.input_data }}
        INPUT_TYPE: ${{ github.event.inputs.input_type }}
        VIDEO_TYPE: ${{ github.event.inputs.video_type }}
        VIDEO_OUTPUT: ${{ github.event.inputs.video_output }}
      run: |
        if [ -z "$INPUT_DATA" ]; then
          export INPUT_DATA="dQw4w9WgXcQ"
          export INPUT_TYPE="yt"
          export VIDEO_TYPE="general"
          export VIDEO_OUTPUT="markdown"
        fi
        python agent_core.py

    - name: 💾 Automatically Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git fetch origin
        git add *.md || true
        git add 🚨*.md || true
        if ! git diff --cached --quiet; then
          git commit -m "✨ AI自動更新：新增分析報告 [skip ci]"
          git push origin HEAD:${{ github.ref }}
        fi
