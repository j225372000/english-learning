name: Daily YouTube Channel Monitor

on:
  schedule:
    - cron: '0 2 * * *' # 每天台灣時間早上 10:00 自動執行 (UTC 02:00)
  workflow_dispatch:    # 允許在網頁上手動點擊一鍵執行測試

jobs:
  monitor-channel:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --force-reinstall youtube-transcript-api
        pip install google-genai feedparser requests

    - name: ⚙️ Run Daily Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      run: python process_video.py
